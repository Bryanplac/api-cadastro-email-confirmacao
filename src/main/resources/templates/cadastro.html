<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <style>
        /* Estilos gerais para o corpo da página */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5; /* Cor de fundo suave */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Ocupa a altura total da tela */
            margin: 0;
        }

        /* Estilos para o contêiner do formulário */
        .cadastro-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Sombra suave */
            width: 100%;
            max-width: 400px; /* Largura máxima do formulário */
            box-sizing: border-box; /* Garante que padding e borda sejam incluídos na largura */
        }

        /* Estilos para o título */
        .cadastro-container h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #333;
        }

        /* Estilos para cada grupo de campo (label + input) */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block; /* Garante que o label ocupe uma linha inteira */
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }

        /* Estilos para o botão de cadastro */
        .btn-cadastrar {
            width: 100%;
            padding: 12px;
            background-color: #007bff; /* Azul padrão */
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease; /* Transição suave ao passar o mouse */
            margin-top: 10px;
        }

        .btn-cadastrar:hover {
            background-color: #0056b3; /* Azul mais escuro ao passar o mouse */
        }

        /* Estilos para o link "Voltar" */
        .link-voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
        }

        .link-voltar:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

<div class="cadastro-container">
    <h2>Cadastro</h2>
    <form action="#" method="POST">
        <div class="form-group">
            <label for="username">Nome de Usuário</label>
            <input type="text" id="username" name="nome" placeholder="Digite seu nome de usuário" required>
        </div>
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
        </div>
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" name="senha" placeholder="Digite sua senha" required>
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirme sua Senha</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirme sua senha" required>
        </div>
        <button type="submit" class="btn-cadastrar">Cadastrar</button>
    </form>
    <a href="#" class="link-voltar">Voltar</a>
</div>

</body>
</html>
