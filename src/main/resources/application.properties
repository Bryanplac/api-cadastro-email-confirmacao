spring.application.name=cadastro
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect


# CONFIGURAcaO DO BANCO
spring.datasource.url=jdbc:mysql://localhost:3306/cadastrodb?useSSL=false&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# Hikari
spring.datasource.hikari.max-lifetime=1700000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000

# CONFIGURAcaO SMTP PARA TESTES USANDO MAILTRAP

spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=07b210e8196bf9
spring.mail.password=42ecdf806aacf0
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.default-encoding=UTF-8

spring.mail.properties.mail.debug=true

# Endereco de e-mail padrao
spring.mail.properties.mail.smtp.from=noreply@cadastro-app.br

spring.jmx.default-domain=br.cadastro.jmx
spring.jmx.server-port=9002
